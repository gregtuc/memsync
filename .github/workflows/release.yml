name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: false

      - name: Validate release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected a semantic version tag such as v0.1.0; got $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify source
        run: |
          gofmt_files="$(gofmt -l .)"
          if [ -n "$gofmt_files" ]; then
            printf 'Files need gofmt:\n%s\n' "$gofmt_files" >&2
            exit 1
          fi
          go vet ./...
          go test -race ./...

      - name: Build release archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            stage="$(mktemp -d)"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath \
                -ldflags "-s -w -X github.com/gregtuc/memsync/cmd.Version=$VERSION" \
                -o "$stage/memsync" .
            cp LICENSE README.md "$stage/"
            tar -C "$stage" -czf "dist/memsync_${VERSION}_${os}_${arch}.tar.gz" \
              memsync LICENSE README.md
            rm -rf "$stage"
          done
          (cd dist && sha256sum memsync_*.tar.gz > checksums.txt)

      - name: Verify archive names and contents
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          for os in darwin linux; do
            for arch in amd64 arm64; do
              archive="dist/memsync_${VERSION}_${os}_${arch}.tar.gz"
              test -f "$archive"
              tar -tzf "$archive" | grep -qx 'memsync'
            done
          done
          test "$(wc -l < dist/checksums.txt | tr -d ' ')" = "4"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          prerelease=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease=(--prerelease)
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --title "memsync $VERSION" \
              --generate-notes \
              "${prerelease[@]}"
          fi
